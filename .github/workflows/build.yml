name: Build & Release

on:
  push:
    branches:
      - "main"
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Build runtime image
        run: mvn clean javafx:jlink

      - name: Package DMG
        run: mvn jpackage:jpackage -Djpackage.type=DMG -Djpackage.icon=src/main/resources/org/chekhov/http_poller_ui/icons/AppIcon.icns

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: HTTP-Poller-mac
          path: target/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Build runtime image
        run: mvn clean javafx:jlink

      - name: Package EXE
        run: mvn jpackage:jpackage -Djpackage.type=EXE -Djpackage.icon=src/main/resources/org/chekhov/http_poller_ui/icons/AppIcon.ico

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: HTTP-Poller-windows
          path: target/dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: HTTP-Poller-mac
          path: dist/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: HTTP-Poller-windows
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac/*.dmg
            dist/windows/*.exe
          generate_release_notes: true